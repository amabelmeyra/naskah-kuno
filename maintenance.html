<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segera Hadir — JARANAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Lato', sans-serif;
      background: #F5EFE0;
      color: #1E1008;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      overflow: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(155,115,25,0.04) 28px, rgba(155,115,25,0.04) 29px),
        repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(155,115,25,0.03) 28px, rgba(155,115,25,0.03) 29px);
      pointer-events: none;
    }

    .wrap { position: relative; z-index: 1; max-width: 560px; width: 100%; }

    /* Badge */
    .badge {
      width: 56px; height: 56px; border-radius: 12px;
      background: #1B4E8B; color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 900; letter-spacing: 0.04em;
      line-height: 1.3; text-align: center;
      margin-bottom: 2rem;
      box-shadow: 0 4px 16px rgba(27,78,139,0.25);
    }

    /* Gear animation */
    .gear-wrap {
      margin-bottom: 2.5rem;
      position: relative; display: inline-flex;
      align-items: center; justify-content: center;
    }
    .gear-outer {
      width: 72px; height: 72px;
      animation: spinSlow 8s linear infinite;
      color: #B8860B; opacity: 0.5;
    }
    .gear-inner {
      position: absolute;
      width: 38px; height: 38px;
      animation: spinSlow 5s linear infinite reverse;
      color: #1B4E8B; opacity: 0.4;
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700; letter-spacing: 0.1em;
      color: #1B4E8B; margin-bottom: 0.5rem;
      line-height: 1.1;
    }
    .sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: #72503E; margin-bottom: 1.75rem;
    }

    .divider {
      width: 48px; height: 2px;
      background: linear-gradient(90deg, transparent, #B8860B, transparent);
      margin: 0 auto 1.75rem;
    }

    p {
      font-size: 0.92rem; color: #48301F; line-height: 1.75;
      max-width: 38ch; margin: 0 auto 2.5rem;
    }

    /* Progress bar */
    .progress-wrap {
      background: #EDE3CE; border-radius: 999px;
      height: 6px; width: 100%; max-width: 320px;
      margin: 0 auto 0.75rem; overflow: hidden;
    }
    .progress-bar {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #1B4E8B, #B8860B);
      width: 35%;
      animation: progressPulse 3s ease-in-out infinite;
    }
    @keyframes progressPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }
    .progress-lbl {
      font-size: 0.7rem; color: #72503E; letter-spacing: 0.06em;
      text-transform: uppercase; font-weight: 700;
    }

    /* Footer */
    .foot {
      position: fixed; bottom: 1.5rem; left: 0; right: 0;
      text-align: center; font-size: 0.68rem; color: #8A6B5C;
      letter-spacing: 0.04em; z-index: 1;
    }
    .foot a { color: #1B4E8B; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }

    /* Watermark */
    .watermark {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(5rem, 18vw, 14rem);
      color: rgba(155,115,25,0.04);
      pointer-events: none; user-select: none;
      white-space: nowrap; z-index: 0;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="watermark">JARANAN</div>

  <div class="wrap">
    <div class="badge">DSP<br>MLG</div>

    <div class="gear-wrap">
      <!-- Gear outer -->
      <svg class="gear-outer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
      <!-- Gear inner -->
      <svg class="gear-inner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </div>

    <h1>JARANAN</h1>
    <p class="sub">Repositori Naskah Kuno Dispussipda Kota Malang</p>

    <div class="divider"></div>

    <p>Kami sedang mempersiapkan sistem repositori digital naskah kuno.<br>Silakan kunjungi kembali dalam waktu dekat.</p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <div class="progress-lbl">Dalam Pengembangan</div>
  </div>

  <div class="foot">
    © 2026 Dinas Perpustakaan Umum dan Arsip Daerah Kota Malang &nbsp;·&nbsp;
    <a href="mailto:dispussipda@malangkota.go.id">dispussipda@malangkota.go.id</a>
  </div>

</body>
</html>
